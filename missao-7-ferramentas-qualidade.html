
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missão 7 Ferramentas da Qualidade - Completa</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin:15px 0}
input,textarea,select,button{padding:10px;border-radius:8px}
input,textarea,select{width:100%;border:none}
button{background:#22c55e;color:#fff;border:none;cursor:pointer}
.hidden{display:none}
.progress{height:20px;background:#334155;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0;background:#38bdf8}
</style>
</head>
<body>
<div class="container">
<h1>🚀 Missão 7 Ferramentas da Qualidade</h1>

<div id="inicio" class="card">
<input id="nome" placeholder="Nome do aluno">
<input id="turma" placeholder="Turma">
<button onclick="iniciar()">Iniciar Missão</button>
</div>

<div id="app" class="hidden">
<div class="card">
<div class="progress"><div id="bar" class="bar"></div></div>
<p>Pontuação: <span id="pts">0</span></p>
</div>
<div id="conteudo" class="card"></div>
</div>

<div id="fim" class="card hidden"></div>
</div>

<script>
let pontos=0;

const objetivas=[
["Descobrir causas de atrasos.","Diagrama de Ishikawa"],
["Priorizar defeitos.","Diagrama de Pareto"],
["Visualizar frequência de dados.","Histograma"],
["Monitorar estabilidade.","Gráfico de Controle"],
["Mapear processo.","Fluxograma"],
["Registrar ocorrências.","Folha de Verificação"],
["Relacionar temperatura e defeitos.","Diagrama de Dispersão"],
["Analisar reclamações recorrentes.","Diagrama de Ishikawa"],
["Priorizar reclamações.","Diagrama de Pareto"],
["Distribuição de vendas.","Histograma"],
["Controlar produção.","Gráfico de Controle"],
["Documentar agendamento.","Fluxograma"],
["Registrar falhas.","Folha de Verificação"],
["Treinamento x produtividade.","Diagrama de Dispersão"],
["Descobrir desperdícios.","Diagrama de Ishikawa"]
];

const ferramentas=["Diagrama de Ishikawa","Folha de Verificação","Histograma","Diagrama de Pareto","Gráfico de Controle","Fluxograma","Diagrama de Dispersão"];

function atualizar(v){bar.style.width=v+'%';pts.innerText=pontos;}
function iniciar(){if(!nome.value||!turma.value){alert('Preencha os dados');return;}inicio.classList.add('hidden');app.classList.remove('hidden');pesquisa();}

function pesquisa(){
conteudo.innerHTML=`<h2>📚 Pesquisa Guiada</h2>
<p>Pesquise e responda:</p>
<textarea rows=3 placeholder="O que é Diagrama de Ishikawa?"></textarea><br><br>
<textarea rows=3 placeholder="O que é Diagrama de Pareto?"></textarea><br><br>
<textarea rows=3 placeholder="O que é Fluxograma?"></textarea><br><br>
<button onclick="pontos+=15;quiz(0)">Concluir</button>`;
atualizar(5);
}

const quizs=[
["Qual ferramenta identifica causas?","Diagrama de Ishikawa"],
["Qual segue a regra 80/20?","Diagrama de Pareto"],
["Qual mostra distribuição?","Histograma"],
["Qual monitora estabilidade?","Gráfico de Controle"],
["Qual representa processos?","Fluxograma"]
];

function quiz(i){
if(i>=quizs.length){situacao(0);return;}
let h=`<h2>🧠 Quiz ${i+1}/5</h2><p>${quizs[i][0]}</p>`;
ferramentas.forEach(f=>h+=`<button onclick="rquiz('${f}',${i})">${f}</button><br><br>`);
conteudo.innerHTML=h; atualizar(15);
}
function rquiz(r,i){if(r===quizs[i][1])pontos+=5;quiz(i+1);}

function situacao(i){
if(i>=objetivas.length){discursiva(0);return;}
let h=`<h2>🎯 Situação ${i+1}/15</h2><p>${objetivas[i][0]}</p>`;
ferramentas.forEach(f=>h+=`<button onclick="rsit('${f}',${i})">${f}</button><br><br>`);
conteudo.innerHTML=h; atualizar(20+(i*2));
}
function rsit(r,i){if(r===objetivas[i][1])pontos+=2;situacao(i+1);}

const discursivas=[
"Qual ferramenta utilizaria para descobrir as causas da lentidão de computadores? Explique.",
"Qual ferramenta utilizaria para priorizar problemas em uma escola? Justifique.",
"Como um Fluxograma ajudaria no processo de matrícula?",
"Como o Diagrama de Dispersão pode ajudar uma empresa?",
"Escolha uma ferramenta e descreva uma aplicação prática."
];

function discursiva(i){
if(i>=discursivas.length){vf(0);return;}
conteudo.innerHTML=`<h2>✍️ Questão Discursiva ${i+1}/5</h2>
<p>${discursivas[i]}</p>
<textarea id='resp' rows='6' placeholder='Digite sua resposta'></textarea><br><br>
<button onclick='pontos+=5;discursiva(${i+1})'>Salvar Resposta</button>`;
atualizar(55+(i*3));
}

const vfPerg=[
["Pareto prioriza problemas.",true],
["Fluxograma mede correlação.",false],
["Histograma mostra distribuição.",true],
["Ishikawa busca causas.",true],
["Folha de Verificação registra dados.",true]
];

function vf(i){
if(i>=vfPerg.length){casoFinal();return;}
conteudo.innerHTML=`<h2>✅ Verdadeiro ou Falso ${i+1}/5</h2><p>${vfPerg[i][0]}</p>
<button onclick='rvf(true,${i})'>Verdadeiro</button>
<button onclick='rvf(false,${i})'>Falso</button>`;
atualizar(75+(i*2));
}
function rvf(r,i){if(r===vfPerg[i][1])pontos+=2;vf(i+1);}

function casoFinal(){
conteudo.innerHTML=`<h2>🏭 Estudo de Caso Final</h2>
<p>Uma empresa registrou 500 reclamações de lentidão, 250 de atualização, 150 de rede e 100 de impressoras.</p>
<p>Qual ferramenta utilizaria para priorizar os problemas?</p>
<select id='ferr'>${ferramentas.map(f=>'<option>'+f+'</option>').join('')}</select><br><br>
<button onclick='finalizar()'>Finalizar</button>`;
atualizar(95);
}

function finalizar(){
if(ferr.value==="Diagrama de Pareto") pontos+=10;
let medalha=pontos>=85?"🥇 Ouro":(pontos>=60?"🥈 Prata":"🥉 Bronze");
let codigo="QUAL-"+new Date().getFullYear()+"-"+pontos+"-"+Math.floor(Math.random()*90000+10000);

app.classList.add('hidden');
fim.classList.remove('hidden');

let texto=`Nome: ${nome.value}
Turma: ${turma.value}
Pontuação: ${pontos}
Medalha: ${medalha}
Código: ${codigo}`;

fim.innerHTML=`<h2>🏆 Missão Concluída</h2>
<p><b>Pontuação:</b> ${pontos}</p>
<p><b>Medalha:</b> ${medalha}</p>
<p><b>Código:</b> ${codigo}</p>
<h3>🏅 Ranking Manual da Turma</h3>
<p>Professor: registre os alunos em uma planilha Excel usando Nome, Pontuação e Código.</p>
<textarea id='resultado' rows='8'>${texto}</textarea><br><br>
<button onclick="navigator.clipboard.writeText(document.getElementById('resultado').value)">Copiar Resultado</button>`;
atualizar(100);
}
</script>
</body>
</html>
