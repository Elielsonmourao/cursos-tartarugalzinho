<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=EIlwKpMGKPPgTgPig3wekjiR7o6HG5m5zcif_vBZPstVPwl0wfYzb8OTmG6lYDRQc_roLi5SaYdluq4e7BT3fhleluckoL5icMlvJ1-F7RfHipTCXqlKnD72jFz7RL3chkLNqU1yvBALJfKm8w0sg8zEGzMPbEjztn8xn2G9c9CbLGHvVKxSsel_bzFZVdVvgRzBiRrCRMKo8l5IkwnGKs0u4ZfyDuUSTLBXBj2x8sUMXx04c-kRmta2n8k5nE7sHjp0H3UfDpyVnVymOPoh4pvjBkX4I71JqSRFMuk9Si2SI46vkKFw_857vU2oCuSwax85B2HU16MERhintYcAj7qdjj7qvXZo-GzwO73cSJs" charset="UTF-8"></script><style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin:15px 0}
input,textarea,select{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none}
button{padding:12px 18px;border:none;border-radius:8px;background:#22c55e;color:#fff;cursor:pointer}
.progress{height:20px;background:#334155;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0;background:#38bdf8}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>🚀 Missão 7 Ferramentas da Qualidade</h1>

<div id="inicio" class="card">
<input id="nome" placeholder="Nome do aluno">
<input id="turma" placeholder="Turma">
<button onclick="iniciar()">Iniciar</button>
</div>

<div id="app" class="hidden">
<div class="card"><div class="progress"><div id="bar" class="bar"></div></div>
<p>Pontos: <span id="pts">0</span>/100</p></div>

<div id="conteudo" class="card"></div>
</div>

<div id="fim" class="card hidden"></div>
</div>

<script>
let pontos=0,fase=0;
const situacoes=[
["Descobrir causas de atrasos.","Diagrama de Ishikawa"],
["Priorizar defeitos.","Diagrama de Pareto"],
["Visualizar frequência de dados.","Histograma"],
["Monitorar estabilidade.","Gráfico de Controle"],
["Mapear processo.","Fluxograma"],
["Registrar ocorrências.","Folha de Verificação"],
["Relacionar temperatura e defeitos.","Diagrama de Dispersão"],
["Analisar reclamações recorrentes.","Diagrama de Ishikawa"],
["Priorizar reclamações.","Diagrama de Pareto"],
["Distribuição de vendas.","Histograma"],
["Controlar produção.","Gráfico de Controle"],
["Documentar agendamento.","Fluxograma"],
["Registrar falhas.","Folha de Verificação"],
["Treinamento x produtividade.","Diagrama de Dispersão"],
["Descobrir causas de desperdícios.","Diagrama de Ishikawa"]
];
const ferramentas=["Diagrama de Ishikawa","Folha de Verificação","Histograma","Diagrama de Pareto","Gráfico de Controle","Fluxograma","Diagrama de Dispersão"];

function iniciar(){
 if(!nome.value||!turma.value){alert('Preencha os dados');return;}
 inicio.classList.add('hidden'); app.classList.remove('hidden');
 pesquisa();
}

function progresso(v){bar.style.width=v+'%';pts.innerText=pontos;}

function pesquisa(){
 conteudo.innerHTML=`<h2>Pesquisa Guiada</h2>
 <textarea placeholder="O que é Ishikawa?"></textarea>
 <textarea placeholder="O que é Pareto?"></textarea>
 <textarea placeholder="O que é Fluxograma?"></textarea>
 <button onclick="pontos+=15;quiz()">Concluir Pesquisa</button>`;
 progresso(10);
}

let q=0;
const quizPerg=[
["Ferramenta para causas?","Diagrama de Ishikawa"],
["Ferramenta 80/20?","Diagrama de Pareto"],
["Mostra distribuição?","Histograma"],
["Monitora processo?","Gráfico de Controle"],
["Representa etapas?","Fluxograma"]
];

function quiz(){
 if(q>=quizPerg.length){situacao(0);return;}
 let p=quizPerg[q];
 let h=`<h2>Quiz</h2><p>${p[0]}</p>`;
 ferramentas.forEach(f=>h+=`<button onclick="respQuiz('${f}')">${f}</button><br><br>`);
 conteudo.innerHTML=h;
 progresso(25);
}
function respQuiz(r){if(r==quizPerg[q][1]) pontos+=5; q++; quiz();}

function situacao(i){
 if(i>=situacoes.length){vf(0);return;}
 let s=situacoes[i];
 let h=`<h2>Missão Situação ${i+1}/15</h2><p>${s[0]}</p>`;
 ferramentas.forEach(f=>h+=`<button onclick="respSit('${f}',${i})">${f}</button><br><br>`);
 conteudo.innerHTML=h;
 progresso(25+(i/15)*35);
}
function respSit(r,i){if(r==situacoes[i][1]) pontos+=2; situacao(i+1);}

const vfs=[
["Pareto prioriza problemas.",true],
["Fluxograma mede correlação.",false],
["Histograma mostra distribuição.",true],
["Ishikawa busca causas.",true],
["Folha de Verificação registra dados.",true],
["Dispersão monitora limites.",false],
["Controle acompanha estabilidade.",true],
["Pareto é gráfico 80/20.",true],
["Fluxograma descreve processo.",true],
["Histograma encontra causas.",false]
];

function vf(i){
 if(i>=vfs.length){casoFinal();return;}
 conteudo.innerHTML=`<h2>Verdadeiro ou Falso ${i+1}/10</h2>
 <p>${vfs[i][0]}</p>
 <button onclick="respVF(true,${i})">Verdadeiro</button>
 <button onclick="respVF(false,${i})">Falso</button>`;
 progresso(65+(i/10)*20);
}
function respVF(r,i){if(r==vfs[i][1]) pontos+=2; vf(i+1);}

function casoFinal(){
 conteudo.innerHTML=`<h2>Desafio Final</h2>
 <p>Lentidão=500, Atualização=250, Rede=150, Impressoras=100.</p>
 <p>Qual ferramenta prioriza os problemas?</p>
 <select id="c1">${ferramentas.map(f=>`<option>${f}</option>`).join('')}</select>
 <button onclick="finalizar()">Finalizar</button>`;
 progresso(90);
}

function finalizar(){
 if(c1.value=="Diagrama de Pareto") pontos+=10;
 app.classList.add('hidden');
 fim.classList.remove('hidden');
 let medalha=pontos>=85?'🥇 Ouro':pontos>=60?'🥈 Prata':'🥉 Bronze';
 let codigo='QUAL-'+new Date().getFullYear()+'-'+Math.floor(Math.random()*90000+10000);
 let msg=`Nome: ${nome.value}\nTurma: ${turma.value}\nPontuação: ${pontos}\nMedalha: ${medalha}\nCódigo: ${codigo}`;
 fim.innerHTML=`<h2>🏆 Concluído</h2>
 <p>${msg.replace(/\n/g,'<br>')}</p>
 <textarea id="res">${msg}</textarea>
 <button onclick="navigator.clipboard.writeText(res.value)">Copiar para WhatsApp</button>`;
}
</script>
</body>
</html>
